services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - potioncheck

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - potioncheck

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_APP_NAME=PotionCheck
    depends_on:
      - backend
    networks:
      - potioncheck

networks:
  potioncheck:
    driver: bridge
